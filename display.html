<!DOCTYPE html>
<html lang="en" data-theme="retro-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="Cowboy Wire">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Cowboy Wire 2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font-retro:  'Courier New', Courier, monospace;
    --font-modern: 'Barlow Condensed', sans-serif;
    --font-label:  'League Spartan', sans-serif;
    --tan:         #C4BEB5;
  }

  [data-theme="retro-dark"] {
    --green: #005640; --green-dark: #003d2e; --green-dim: #002a1a;
    --tile-bg: #1a1a1a; --tile-border: #2c2c2c; --tile-text: #f0ebe0;
    --board-bg: #0d0d0d; --header-bg: #0a0a0a; --flip-mid: #005640;
    --font-tile: var(--font-retro); --font-ui: var(--font-retro);
    --scaleX: 0.78; --scanline: 1;
  }
  [data-theme="retro-light"] {
    --green: #005640; --green-dark: #003d2e; --green-dim: #d0e8e0;
    --tile-bg: #e8e4dc; --tile-border: #c8c3b8; --tile-text: #005640;
    --board-bg: #f0ede6; --header-bg: #0d0d0d; --flip-mid: #005640;
    --font-tile: var(--font-retro); --font-ui: var(--font-retro);
    --scaleX: 0.78; --scanline: 0;
  }
  [data-theme="modern-dark"] {
    --green: #00a86b; --green-dark: #007a4d; --green-dim: #002a1a;
    --tile-bg: #141414; --tile-border: #242424; --tile-text: #f0ebe0;
    --board-bg: #0a0a0a; --header-bg: #080808; --flip-mid: #00a86b;
    --font-tile: var(--font-modern); --font-ui: var(--font-label);
    --scaleX: 1; --scanline: 0;
  }
  [data-theme="modern-light"] {
    --green: #005640; --green-dark: #003d2e; --green-dim: #d0e8e0;
    --tile-bg: #ffffff; --tile-border: #ddd8d0; --tile-text: #005640;
    --board-bg: #f4f2ef; --header-bg: #0d0d0d; --flip-mid: #005640;
    --font-tile: var(--font-modern); --font-ui: var(--font-label);
    --scaleX: 1; --scanline: 0;
  }
  [data-theme="walle"] {
    --green: #c8a84b; --green-dark: #9a7a2a; --green-dim: #2a1a00;
    --tile-bg: #1a1000; --tile-border: #3a2800; --tile-text: #f0c060;
    --board-bg: #0d0800; --header-bg: #080500; --flip-mid: #c8a84b;
    --font-tile: var(--font-retro); --font-ui: var(--font-retro);
    --scaleX: 0.78; --scanline: 1;
  }
  [data-theme="eve"] {
    --green: #4db8ff; --green-dark: #2a8acc; --green-dim: #001a2a;
    --tile-bg: #f0f8ff; --tile-border: #c0e0f8; --tile-text: #003366;
    --board-bg: #e8f4ff; --header-bg: #001830; --flip-mid: #4db8ff;
    --font-tile: var(--font-modern); --font-ui: var(--font-label);
    --scaleX: 1; --scanline: 0;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--board-bg); overflow: hidden;
    font-family: var(--font-ui); transition: background 0.3s;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
    pointer-events: none; z-index: 100;
    opacity: var(--scanline, 0); transition: opacity 0.4s;
  }

  #header {
    position: relative; width: 100%; height: 10vh;
    min-height: 56px; max-height: 80px;
    background: var(--header-bg); border-bottom: 3px solid var(--green);
    display: flex; align-items: center; padding: 0 1.5vw; gap: 1.5vw;
    z-index: 10; overflow: hidden; transition: border-color 0.3s;
  }
  .h-badge {
    background: var(--green); color: #fff;
    font-family: var(--font-ui); font-size: clamp(10px,1vw,16px);
    font-weight: 900; letter-spacing: 0.15em;
    padding: 5px 14px; border-radius: 3px;
    text-transform: uppercase; white-space: nowrap;
    flex-shrink: 0; transition: background 0.3s;
  }
  .h-divider {
    flex: 1; min-width: 8px; height: 1px;
    background: linear-gradient(90deg, rgba(196,190,181,0.25), rgba(196,190,181,0.05));
  }
  .h-school {
    color: var(--tan); font-family: var(--font-ui);
    font-size: clamp(10px,1.1vw,18px); letter-spacing: 0.2em;
    text-transform: uppercase; white-space: nowrap;
    flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; min-width: 0;
  }
  .h-sync { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #333; transition: background 0.4s; flex-shrink: 0;
  }
  .sync-dot.live { background: var(--green); animation: blink 2.5s infinite; }
  .sync-dot.error { background: #882222; }
  .sync-label {
    color: #555; font-family: var(--font-retro);
    font-size: clamp(8px,0.65vw,11px); letter-spacing: 0.12em;
    text-transform: uppercase; white-space: nowrap;
  }
  .h-period-timer {
    display: flex; flex-direction: column;
    align-items: flex-end; flex-shrink: 0; gap: 1px;
  }
  .h-period-label {
    font-family: var(--font-ui); font-size: clamp(8px,0.7vw,12px);
    letter-spacing: 0.15em; color: var(--green);
    text-transform: uppercase; white-space: nowrap; font-weight: 700;
  }
  .h-period-time {
    font-family: var(--font-ui); font-size: clamp(10px,0.9vw,15px);
    letter-spacing: 0.1em; color: var(--tan);
    white-space: nowrap; font-weight: 700;
  }
  .h-period-time.warning { color: #ff9900; }
  .h-period-time.ending  { color: #cc4444; animation: blink 1s infinite; }
  .h-pass-status {
    font-family: var(--font-ui); font-size: clamp(7px,0.65vw,11px);
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    white-space: nowrap; padding: 2px 7px; border-radius: 3px;
    transition: background 0.4s, color 0.4s;
  }
  .h-pass-status.green  { background: #166534; color: #fff; }
  .h-pass-status.yellow { background: #d97706; color: #fff; }
  .h-pass-status.red    { background: #dc2626; color: #fff; }
  .h-pass-status.blue   { background: #1d4ed8; color: #fff; }
  .h-pass-status.hidden { display: none; }
  .h-clock {
    color: #f0ebe0; font-family: var(--font-ui);
    font-size: clamp(18px,2.2vw,38px); font-weight: 700;
    letter-spacing: 0.08em; white-space: nowrap;
    flex-shrink: 0; text-align: right;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  #noise-meter {
    display: none; align-items: center; gap: 3px;
    flex-shrink: 0; height: 32px; padding: 0 4px;
    cursor: pointer; position: relative;
  }
  #noise-meter.active { display: flex; }
  #noise-meter .nm-bar {
    width: 6px; height: 20px; border-radius: 2px;
    background: #222; transition: background 0.1s ease;
  }
  #noise-meter .nm-bar.on-green  { background: var(--green); }
  #noise-meter .nm-bar.on-yellow { background: #d97706; }
  #noise-meter .nm-bar.on-red    { background: #dc2626; }

  #noise-panel {
    position: fixed; top: calc(10vh + 8px); left: 20px;
    background: #1e1e1e; border: 1px solid #444; border-radius: 10px;
    padding: 14px 16px; z-index: 70; opacity: 0; pointer-events: none;
    transform: translateY(-6px) scale(0.97);
    transition: opacity 0.2s, transform 0.2s;
    min-width: 220px; display: flex; flex-direction: column; gap: 10px;
  }
  #noise-panel.open { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
  .np-title { font-family: var(--font-retro); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: #888; }
  .np-presets { display: flex; gap: 5px; }
  .np-preset {
    flex: 1; padding: 5px 4px; border-radius: 3px;
    border: 1px solid #444; background: #2a2a2a; color: #aaa;
    font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; font-family: var(--font-retro); transition: all 0.2s; text-align: center;
  }
  .np-preset.active { border-color: var(--green); color: var(--green); background: #0d1f18; }
  .np-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .np-row-label { font-family: var(--font-retro); font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: #999; white-space: nowrap; }
  .np-slider { flex: 1; accent-color: var(--green); cursor: pointer; }
  .np-val { font-family: var(--font-retro); font-size: 9px; color: #ccc; width: 28px; text-align: right; }
  .np-toggle {
    width: 100%; padding: 8px; border-radius: 4px;
    border: 1px solid #2a2a2a; background: #0a0a0a; color: #555;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; font-family: var(--font-retro); transition: all 0.2s; text-align: center;
  }
  .np-toggle.on { background: var(--green); border-color: var(--green); color: #fff; }

  #board-wrap {
    width: 100%; height: calc(100vh - 10vh - 3px);
    display: flex; flex-direction: column;
    padding: 1.2vh 1.5vw; gap: 0.5vh;
  }
  .tile-row { flex: 1; display: flex; gap: 0.3vw; align-items: stretch; }
  .tile {
    flex: 1; background: var(--tile-bg); border: 1px solid var(--tile-border);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; transition: background 0.3s, border-color 0.3s;
  }
  .tile::after {
    content: ''; position: absolute; left: 4%; right: 4%; top: 50%;
    height: 1px; background: rgba(0,0,0,0.2);
    transform: translateY(-50%); z-index: 2;
  }
  .tile-char {
    font-size: clamp(24px,6.4vh,112px); font-weight: 900;
    color: var(--tile-text); line-height: 1; letter-spacing: -0.02em;
    user-select: none; position: relative; z-index: 3;
    font-family: var(--font-tile);
    transform: scaleX(var(--scaleX, 0.78));
    transition: font-family 0s, color 0.3s;
  }
  @keyframes flipDown {
    0%  { transform: scaleY(1) scaleX(var(--scaleX,0.78)); background: var(--tile-bg) }
    25% { transform: scaleY(0.3) scaleX(var(--scaleX,0.78)); background: var(--flip-mid) }
    45% { transform: scaleY(0.02) scaleX(var(--scaleX,0.78)); background: var(--flip-mid) }
    65% { transform: scaleY(0.02) scaleX(var(--scaleX,0.78)); background: var(--flip-mid) }
    85% { transform: scaleY(0.4) scaleX(var(--scaleX,0.78)); background: var(--tile-bg) }
    100%{ transform: scaleY(1) scaleX(var(--scaleX,0.78)); background: var(--tile-bg) }
  }
  .tile.flipping { animation: flipDown 0.65s cubic-bezier(0.4,0,0.2,1) forwards; }

  #honor-ticker-wrap {
    position: fixed; bottom: 4px; left: 0; right: 0; height: 28px;
    background: rgba(0,0,0,0.82); border-top: 1px solid var(--green-dim);
    z-index: 9; overflow: hidden; display: none; align-items: center; transition: opacity 0.5s;
  }
  #honor-ticker-label {
    background: var(--green); color: #fff; font-family: var(--font-retro);
    font-size: 10px; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 0 12px; height: 100%; display: flex; align-items: center;
    white-space: nowrap; flex-shrink: 0;
  }
  #honor-ticker-track { flex: 1; overflow: hidden; position: relative; height: 100%; }
  #honor-ticker-inner {
    display: inline-flex; align-items: center; height: 100%; white-space: nowrap;
    animation: tickerScroll 400s linear infinite; will-change: transform;
  }
  @keyframes tickerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .ticker-name { font-size: 11px; font-weight: 700; color: var(--tan); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 6px; }
  .ticker-sep  { color: var(--green); font-size: 10px; padding: 0 4px; opacity: 0.7; }

  #bottom-accent {
    position: fixed; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--green-dark) 0%, var(--green) 30%, var(--tan) 50%, var(--green) 70%, var(--green-dark) 100%);
    z-index: 10;
  }

  #indicator-bar {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 7px; align-items: center; z-index: 50;
  }
  .ind-dot { width: 7px; height: 7px; border-radius: 50%; background: #2a2a2a; transition: background 0.3s; }
  .ind-dot.active { background: var(--green); }

  #dial-trigger { position: fixed; bottom: 0; right: 0; width: 80px; height: 80px; z-index: 60; cursor: pointer; }
  #dial-panel {
    position: fixed; bottom: 20px; right: 20px;
    background: #1e1e1e; border: 1px solid #444; border-radius: 12px;
    padding: 16px 18px; z-index: 60; opacity: 0; pointer-events: none;
    transform: translateY(8px) scale(0.96); transition: opacity 0.2s, transform 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 12px; min-width: 200px;
  }
  #dial-panel.open { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
  .dial-panel-title { font-family: var(--font-retro); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: #888; }
  .dial-mode-name  { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); transition: color 0.3s; min-height: 24px; }
  .dial-knob-wrap  { position: relative; width: 80px; height: 80px; cursor: pointer; }
  .dial-knob { width: 80px; height: 80px; border-radius: 50%; background: #2a2a2a; border: 2px solid #555; box-shadow: inset 0 2px 6px rgba(0,0,0,0.8); position: relative; transition: transform 0.05s; }
  .dial-knob:active { transform: scale(0.96); }
  .dial-needle { position: absolute; width: 3px; height: 18px; background: var(--green); border-radius: 2px; left: 50%; top: 6px; transform-origin: 50% 34px; transform: translateX(-50%) rotate(-135deg); transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), background 0.3s; }
  .dial-center-dot { position: absolute; width: 14px; height: 14px; background: #222; border: 1px solid #333; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .dial-positions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .dial-pos { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  .dial-pos-dot { width: 7px; height: 7px; border-radius: 50%; background: #2a2a2a; border: 1px solid #333; transition: background 0.2s, transform 0.2s; }
  .dial-pos-dot.active { background: var(--green); border-color: var(--green); transform: scale(1.4); }
  .dial-pos-label { font-family: var(--font-retro); font-size: 7px; letter-spacing: 0.1em; color: #777; text-transform: uppercase; transition: color 0.2s; }
  .dial-pos-label.active { color: var(--green); }
  .dial-divider { width: 1px; height: 16px; background: #444; }
  .dial-row { display: flex; align-items: center; justify-content: space-between; width: 100%; padding-top: 10px; border-top: 1px solid #1e1e1e; gap: 8px; }
  .dial-row-label { font-family: var(--font-retro); font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: #888; }
  .dial-btn { background: #2a2a2a; border: 1px solid #555; color: #aaa; font-family: var(--font-retro); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 10px; border-radius: 3px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .dial-btn:hover { border-color: var(--green); color: var(--green); }
  .dial-btn.on { border-color: var(--green); color: var(--green); background: #0d1f18; }
  #dial-hint { position: fixed; bottom: 12px; right: 16px; font-family: var(--font-retro); font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: #2a2a2a; z-index: 59; cursor: pointer; transition: color 0.2s; }
  #dial-hint:hover { color: #444; }
  body:hover #dial-hint { color: #2e2e2e; }

  #sound-prompt {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,86,64,0.85); color: #fff; font-family: var(--font-retro);
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 7px 18px; border-radius: 4px; cursor: pointer; z-index: 200; transition: opacity 0.5s;
  }

  #version-badge {
    position: fixed; top: calc(10vh + 6px); right: 8px;
    font-family: var(--font-retro); font-size: 7px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: #222; z-index: 5;
  }
</style>
</head>
<body>

<div id="header">
  <div class="h-badge" id="roomBadge">CW · LOADING</div>

  <div id="noise-meter" title="Noise level — click to adjust" onclick="toggleNoisePanel()">
    <div class="nm-bar" id="nm0"></div><div class="nm-bar" id="nm1"></div>
    <div class="nm-bar" id="nm2"></div><div class="nm-bar" id="nm3"></div>
    <div class="nm-bar" id="nm4"></div><div class="nm-bar" id="nm5"></div>
    <div class="nm-bar" id="nm6"></div><div class="nm-bar" id="nm7"></div>
    <div class="nm-bar" id="nm8"></div><div class="nm-bar" id="nm9"></div>
    <div class="nm-bar" id="nm10"></div><div class="nm-bar" id="nm11"></div>
  </div>

  <div class="h-divider"></div>
  <div class="h-school" id="headerTitle">COWBOY WIRE · RIVERDALE PONY EXPRESS</div>
  <div class="h-divider"></div>

  <div class="h-sync">
    <div class="sync-dot" id="syncDot"></div>
    <span class="sync-label" id="syncLabel">Starting...</span>
  </div>
  <div class="h-divider" style="max-width:1vw"></div>

  <div class="h-period-timer" id="periodTimer" style="display:none">
    <div class="h-period-label" id="periodLabel"></div>
    <div class="h-period-time"  id="periodTime"></div>
    <div class="h-pass-status hidden" id="passStatusPill"></div>
  </div>
  <div class="h-divider" style="max-width:1vw"></div>
  <div class="h-clock" id="clock">--:-- --</div>
</div>

<div id="noise-panel">
  <div class="np-title">🎙 Noise Meter</div>
  <div class="np-presets">
    <div class="np-preset active" id="np-quiet"  onclick="nmPreset('quiet')">Quiet</div>
    <div class="np-preset"        id="np-normal" onclick="nmPreset('normal')">Normal</div>
    <div class="np-preset"        id="np-loud"   onclick="nmPreset('loud')">Loud Room</div>
  </div>
  <div class="np-row">
    <span class="np-row-label">🟡 Yellow at</span>
    <input class="np-slider" type="range" id="nm-yellow-slider" min="10" max="80" value="40" oninput="nmSliderChange()">
    <span class="np-val" id="nm-yellow-val">40</span>
  </div>
  <div class="np-row">
    <span class="np-row-label">🔴 Red at</span>
    <input class="np-slider" type="range" id="nm-red-slider" min="20" max="95" value="68" oninput="nmSliderChange()">
    <span class="np-val" id="nm-red-val">68</span>
  </div>
  <button class="np-toggle" id="nm-toggle-btn" onclick="toggleNoiseMeter()">📊 Enable Noise Meter</button>
</div>

<div id="board-wrap"></div>

<div id="honor-ticker-wrap">
  <div id="honor-ticker-label">🎓 Honor Roll</div>
  <div id="honor-ticker-track"><div id="honor-ticker-inner"></div></div>
</div>

<div id="bottom-accent"></div>
<div id="indicator-bar"></div>
<div id="version-badge">CW 2.0</div>
<div id="sound-prompt" onclick="enableSound(this)">▶ Click to enable flip sound</div>

<div id="dial-hint" onclick="toggleDial()">◎ MODE</div>
<div id="dial-trigger" onclick="toggleDial()"></div>
<div id="dial-panel">
  <div class="dial-panel-title">Cowboy Wire 2.0 · Display Mode</div>
  <div class="dial-mode-name" id="dialModeName">Retro · Dark</div>
  <div class="dial-knob-wrap" onclick="dialNext()">
    <div class="dial-knob">
      <div class="dial-needle" id="dialNeedle"></div>
      <div class="dial-center-dot"></div>
    </div>
  </div>
  <div class="dial-positions" id="dialPositions"></div>
  <div class="dial-row">
    <span class="dial-row-label">Sound</span>
    <button class="dial-btn" id="soundToggleBtn" onclick="cycleSoundProfile()">🔊 Classic</button>
  </div>
  <div class="dial-row">
    <span class="dial-row-label">Noise Meter</span>
    <button class="dial-btn" id="noiseToggleBtn" onclick="toggleNoiseMeter()">📊 OFF</button>
  </div>
</div>

  '2026-09-07','2026-11-11','2026-11-26','2026-11-27',

];

const DATE_OVERRIDES = {};

function toMins(t) { var p = t.split(':'); return parseInt(p[0])*60+parseInt(p[1]); }
function nowMins() { var n = new Date(); return n.getHours()*60+n.getMinutes(); }
function dateStr(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}

function getSchedule() {
  var now = new Date();
  var ds  = dateStr(now);
  var dow = now.getDay();
  if (dow === 0 || dow === 6 || NO_SCHOOL.includes(ds)) return null;
  if (DATE_OVERRIDES[ds]) return SCHEDULES[DATE_OVERRIDES[ds]];
  if (dow === 3) return SCHEDULES.blockWed;
  if (dow === 4) return SCHEDULES.blockThu;
  if (dow === 1) return SCHEDULES.earlyRelease;
  return SCHEDULES.regular;
}

function updatePeriodTimer() {
  var wrap  = document.getElementById('periodTimer');
  var label = document.getElementById('periodLabel');
  var time  = document.getElementById('periodTime');
  if (!wrap) return;
  var sched = getSchedule();
  if (!sched) { wrap.style.display = 'none'; return; }
  var nm = nowMins();
  for (var i = 0; i < sched.periods.length; i++) {
    var p = sched.periods[i];
    var s = toMins(p.start), e = toMins(p.end);
    if (nm >= s && nm < e) {
      var left = e - nm;
      if (p.break) {
        label.textContent = p.label;
        time.textContent  = left + ' MIN';
        time.className    = 'h-period-time';
      } else {
        var sinceStart = nm - s;
        label.textContent = p.label;
        time.textContent  = left + ' MIN LEFT';
        time.className    = 'h-period-time' + (left<=5?' ending':left<=15?' warning':'');
        updatePassPill(left, sinceStart);
      }
      wrap.style.display = 'flex';
      return;
    }
    if (nm < s) {
      label.textContent = 'NEXT: ' + p.label;
      time.textContent  = 'IN ' + (s-nm) + ' MIN';
      time.className    = 'h-period-time';
      wrap.style.display = 'flex';
      document.getElementById('passStatusPill').className = 'h-pass-status hidden';
      return;
    }
  }
  wrap.style.display = 'none';
}

function updatePassPill(left, sinceStart) {
  var pill = document.getElementById('passStatusPill');
  if (!pill) return;
  if (sinceStart < 15)     { pill.className = 'h-pass-status red';    pill.textContent = '🔴 Hold · OK in '+(15-sinceStart)+'m'; }

  else                     { pill.className = 'h-pass-status green';  pill.textContent = '🟢 OK · '+left+' min'; }
}

// ── ALIGNMENT ── supports 'center' (default) and 'left'
function padLine(text, cols, align) {
  text = (text || '').toUpperCase().substring(0, cols);
  if (align === 'left') {
    return text + ' '.repeat(cols - text.length);
  }
  var total = cols - text.length, left = Math.floor(total / 2);
  return ' '.repeat(left) + text + ' '.repeat(total - left);
}

function animateTile(tile, finalChar, delay) {
  return new Promise(function(resolve) {
    setTimeout(function() {
      var step = 0;
      var iv = setInterval(function() {
        var rnd = CHARS[Math.floor(Math.random() * CHARS.length)];
        tile.charEl.textContent = rnd;
        tile.el.style.background = step % 2 === 0 ? '#0f2a1a' : '#162c1e';
        tile.charEl.style.color  = step % 2 === 0 ? '#00cc66' : '#C4BEB5';
        step++;
        if (step >= SCRAMBLE_STP) {
          clearInterval(iv);
          var ch = (finalChar || ' ').trim();
          tile.charEl.textContent = ch;
          tile.charEl.style.color = 'var(--tile-text)';
          tile.el.style.background = 'var(--tile-bg)';
          tile.el.classList.add('flipping');
          tile.el.addEventListener('animationend', function() {
            tile.el.classList.remove('flipping');
            resolve();
          }, { once: true });
        }
      }, SCRAMBLE_MS);
    }, delay);
  });
}

function showMessage(idx) {
  if (!messages.length) return;
  idx = ((idx % messages.length) + messages.length) % messages.length;
  currentIdx = idx;
  var msg = messages[idx];
  var align = msg.align || 'center';
  var newLines = Array.from({ length: ROWS }, function(_, r) { return padLine(msg.lines[r] || '', COLS, align); });
  updateDots();
  var changedTiles = 0;
  for (var r = 0; r < ROWS; r++)
    for (var c = 0; c < COLS; c++)
      if (newLines[r][c] !== prevLines[r][c]) changedTiles++;
  if (changedTiles > 0) playFlipSound(changedTiles);
  for (var r2 = 0; r2 < ROWS; r2++)
    for (var c2 = 0; c2 < COLS; c2++)
      if (newLines[r2][c2] !== prevLines[r2][c2])
        animateTile(tiles[r2][c2], newLines[r2][c2], Math.random() * 1200);
  prevLines = newLines;
  scheduleNext(msg.speed || 10);
}

function scheduleNext(speedSec) {
  clearTimeout(rotateTimer);
  if (messages.length > 1)
    rotateTimer = setTimeout(function() { showMessage(currentIdx + 1); }, (speedSec || 10) * 1000);
}

function nextMsg() { clearTimeout(rotateTimer); showMessage(currentIdx + 1); }
function prevMsg() { clearTimeout(rotateTimer); showMessage(currentIdx - 1); }

function buildDots() {
  var bar = document.getElementById('indicator-bar');
  bar.innerHTML = '';
  var count = Math.min(messages.length, 16);
  for (var i = 0; i < count; i++) {
    var d = document.createElement('div');
    d.className = 'ind-dot';
    bar.appendChild(d);
  }
  if (messages.length > 16) {
    var sp = document.createElement('span');
    sp.style.cssText = 'color:#333;font-size:10px;letter-spacing:0.1em';
    sp.textContent = '+' + (messages.length - 16);
    bar.appendChild(sp);
  }
  updateDots();
}

function updateDots() {
  document.querySelectorAll('.ind-dot').forEach(function(d, i) {

}

function updateClock() {

async function startBoard() {
  setSyncStatus('', 'LOADING...');
  await loadRoomConfig();

  var screens = await loadScreens();
  if (screens && screens.length) {
    messages = screens;
  } else {
    messages = [{
      lines: ['COWBOY WIRE 2.0', 'ROOM ' + ROOM, '', 'RIVERDALE HIGH SCHOOL', '', 'CONNECTING...', ''],
      speed: 10, align: 'center'
    }];
  }

  prevLines = Array.from({ length: ROWS }, function() { return '\x00'.repeat(COLS); });
  buildDots();
  showMessage(0);
  setSyncStatus('live', 'LIVE · ROOM ' + ROOM);

  clearInterval(syncTimer);
  syncTimer = setInterval(async function() {
    var fresh = await loadScreens();
    if (fresh) {
      var savedLine = (messages[currentIdx] && messages[currentIdx].lines) ? messages[currentIdx].lines[0] : '';
      messages = fresh;
      var ni = messages.findIndex(function(m) { return m.lines && m.lines[0] === savedLine; });
      if (ni >= 0) currentIdx = ni;
      buildDots();
      var t = new Date();
      var h = t.getHours() % 12 || 12;
      setSyncStatus('live', 'SYNCED ' + h + ':' + t.getMinutes().toString().padStart(2,'0'));
    } else {
      setSyncStatus('error', 'SYNC FAILED');
    }
  }, SYNC_SEC * 1000);
}

var nmOn = false, nmStream = null, nmAnalyser = null, nmAnimFrame = null, nmAudioCtx = null;
var nmYellow = 40, nmRed = 68, nmPresetKey = 'normal';
var NM_PRESETS = { quiet:{yellow:30,red:55}, normal:{yellow:40,red:68}, loud:{yellow:55,red:80} };

try {
  var saved = JSON.parse(localStorage.getItem('cw2-noise-' + ROOM) || '{}');
  if (saved.on !== undefined) nmOn = !!saved.on;
  if (saved.yellow) nmYellow = saved.yellow;
  if (saved.red)    nmRed    = saved.red;
  if (saved.preset) nmPresetKey = saved.preset;
} catch(e) {}

function nmSave() {
  try { localStorage.setItem('cw2-noise-' + ROOM, JSON.stringify({on:nmOn,yellow:nmYellow,red:nmRed,preset:nmPresetKey})); } catch(e) {}
}
function nmPreset(key) {
  nmPresetKey = key;
  var p = NM_PRESETS[key];
  nmYellow = p.yellow; nmRed = p.red;
  document.getElementById('nm-yellow-slider').value = nmYellow;
  document.getElementById('nm-red-slider').value    = nmRed;
  document.getElementById('nm-yellow-val').textContent = nmYellow;
  document.getElementById('nm-red-val').textContent    = nmRed;
  ['quiet','normal','loud'].forEach(function(k) {
    document.getElementById('np-'+k).className = 'np-preset' + (k===key?' active':'');
  });
  nmSave();
}
function nmSliderChange() {
  nmYellow = parseInt(document.getElementById('nm-yellow-slider').value);
  nmRed    = parseInt(document.getElementById('nm-red-slider').value);
  document.getElementById('nm-yellow-val').textContent = nmYellow;
  document.getElementById('nm-red-val').textContent    = nmRed;
  ['quiet','normal','loud'].forEach(function(k) { document.getElementById('np-'+k).className='np-preset'; });
  nmPresetKey = 'custom'; nmSave();
}
function nmUpdateUI() {
  var meter   = document.getElementById('noise-meter');
  var btn     = document.getElementById('nm-toggle-btn');
  var dialBtn = document.getElementById('noiseToggleBtn');
  if (nmOn) {
    meter.classList.add('active');
    btn.className = 'np-toggle on';
    btn.textContent = '🎙 Meter ON — Click to disable';
    if (dialBtn) { dialBtn.className='dial-btn on'; dialBtn.textContent='📊 ON'; }
  } else {
    meter.classList.remove('active');
    btn.className = 'np-toggle';
    btn.textContent = '📊 Enable Noise Meter';
    if (dialBtn) { dialBtn.className='dial-btn'; dialBtn.textContent='📊 OFF'; }
  }
  document.getElementById('nm-yellow-slider').value = nmYellow;
  document.getElementById('nm-red-slider').value    = nmRed;
  document.getElementById('nm-yellow-val').textContent = nmYellow;
  document.getElementById('nm-red-val').textContent    = nmRed;
  ['quiet','normal','loud'].forEach(function(k) {
    document.getElementById('np-'+k).className = 'np-preset'+(k===nmPresetKey?' active':'');
  });
}
async function nmStart() {
  if (nmStream) return;
  try {
    nmStream   = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    nmAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    var source = nmAudioCtx.createMediaStreamSource(nmStream);
    nmAnalyser = nmAudioCtx.createAnalyser();
    nmAnalyser.fftSize = 256; nmAnalyser.smoothingTimeConstant = 0.75;
    source.connect(nmAnalyser); nmTick();
  } catch(e) { nmOn = false; nmSave(); nmUpdateUI(); }
}
function nmStop() {
  if (nmAnimFrame) { cancelAnimationFrame(nmAnimFrame); nmAnimFrame = null; }
  if (nmStream)    { nmStream.getTracks().forEach(function(t){t.stop();}); nmStream = null; }
  if (nmAudioCtx)  { nmAudioCtx.close(); nmAudioCtx = null; }
  nmAnalyser = null;
  for (var i = 0; i < 12; i++) { var b=document.getElementById('nm'+i); if(b) b.className='nm-bar'; }
}
function nmTick() {
  if (!nmAnalyser) return;
  var data = new Uint8Array(nmAnalyser.frequencyBinCount);
  nmAnalyser.getByteFrequencyData(data);
  var slice = Math.floor(data.length*0.67);
  var sum = 0;
  for (var i=0;i<slice;i++) sum += data[i]*data[i];
  var rms   = Math.sqrt(sum/slice);
  var level = Math.min(100, Math.round((rms/255)*100*2.2));
  for (var j=0;j<12;j++) {
    var b = document.getElementById('nm'+j);
    if (!b) continue;
    var on = level >= (j+1)*8.33;
    if (on) {
      if      (level >= nmRed)    b.className = 'nm-bar on-red';
      else if (level >= nmYellow) b.className = 'nm-bar on-yellow';
      else                        b.className = 'nm-bar on-green';
    } else { b.className = 'nm-bar'; }
  }
  nmAnimFrame = requestAnimationFrame(nmTick);
}
async function toggleNoiseMeter() {
  nmOn = !nmOn; nmSave(); nmUpdateUI();
  if (nmOn) await nmStart(); else nmStop();
}
var noisePanelOpen = false;

});

// ── FLIP SOUND ───────────────────────────────────────
var SOUND_PROFILES = ['OFF','CLASSIC','JADE','DIGITAL'];
var soundIdx = 1, audioCtx = null;
try { var s=localStorage.getItem('cw2-sound');if(s&&SOUND_PROFILES.includes(s))soundIdx=SOUND_PROFILES.indexOf(s); }catch(e){}
function getAudioCtx(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}return audioCtx.state==='suspended'?null:audioCtx;}
function enableSound(el){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();if(soundIdx===0){soundIdx=1;updateSoundBtn();}if(el){el.style.opacity='0';setTimeout(function(){el.remove();},600);}playFlipSound(5);}
function cycleSoundProfile(){if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();soundIdx=(soundIdx+1)%SOUND_PROFILES.length;try{localStorage.setItem('cw2-sound',SOUND_PROFILES[soundIdx]);}catch(e){}updateSoundBtn();if(SOUND_PROFILES[soundIdx]!=='OFF')playFlipSound(6);}
function updateSoundBtn(){var btn=document.getElementById('soundToggleBtn');if(!btn)return;var labels={OFF:'🔇 OFF',CLASSIC:'🔊 Classic',JADE:'⌨️ Jade',DIGITAL:'💾 Digital'};btn.textContent=labels[SOUND_PROFILES[soundIdx]];}
function playFlipSound(n){var profile=SOUND_PROFILES[soundIdx];if(profile==='OFF')return;var ctx=getAudioCtx();if(!ctx)return;if(ctx.state==='suspended'){ctx.resume();return;}if(profile==='CLASSIC')playClassicSound(n);if(profile==='JADE')playJadeSound(n);if(profile==='DIGITAL')playDigitalSound(n);}
function playClassicClick(ctx,time,vol){var buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.09),ctx.sampleRate);var data=buf.getChannelData(0);for(var i=0;i<data.length;i++){var t=i/data.length;data[i]=((Math.random()*2-1)*0.65+Math.sin(2*Math.PI*160*i/ctx.sampleRate)*0.35)*Math.pow(1-t,2.8);}var src=ctx.createBufferSource();src.buffer=buf;var f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=800;f.Q.value=1.2;var g=ctx.createGain();g.gain.value=vol||0.18;src.connect(f);f.connect(g);g.connect(ctx.destination);src.start(time);}
function playClassicSound(n){var ctx=getAudioCtx();if(!ctx)return;var now=ctx.currentTime,clicks=Math.min(Math.max(Math.floor(n*0.5),4),20);for(var i=0;i<clicks;i++)playClassicClick(ctx,now+(i/clicks)*2.8,0.08+Math.sin(i/clicks*Math.PI)*0.14);}
function playJadeSound(n){var ctx=getAudioCtx();if(!ctx)return;var now=ctx.currentTime,freq=1800,decay=0.015,vol=0.26,spread=Math.min(n*0.008,1.8),count=Math.min(Math.max(Math.floor(n*0.6),4),60);for(var i=0;i<count;i++){var t=now+(i/count)*spread,v=vol*(0.75+Math.random()*0.25);var osc=ctx.createOscillator(),gain=ctx.createGain();osc.type='square';osc.frequency.setValueAtTime(freq,t);osc.frequency.exponentialRampToValueAtTime(freq*0.45,t+decay);gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(v,t+0.0003);gain.gain.exponentialRampToValueAtTime(0.001,t+decay*1.5);var f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=freq;f.Q.value=2.8;osc.connect(f);f.connect(gain);gain.connect(ctx.destination);osc.start(t);osc.stop(t+decay*2);}}
function playDigitalSound(n){var ctx=getAudioCtx();if(!ctx)return;var now=ctx.currentTime,beeps=Math.min(Math.max(Math.floor(n*0.4),3),16);var freqs=[1100,990,880,770,990,1100,880,770];for(var i=0;i<beeps;i++){var osc=ctx.createOscillator(),g=ctx.createGain();osc.type='square';osc.frequency.value=freqs[i%freqs.length];g.gain.setValueAtTime(0,now+(i/beeps)*2.8);g.gain.linearRampToValueAtTime(0.1,now+(i/beeps)*2.8+0.004);g.gain.linearRampToValueAtTime(0,now+(i/beeps)*2.8+0.034);osc.connect(g);g.connect(ctx.destination);osc.start(now+(i/beeps)*2.8);osc.stop(now+(i/beeps)*2.8+0.05);}}

// ── MODE DIAL ────────────────────────────────────────
var DISPLAY_MODES = [
  { key:'retro-dark',   label:'Retro · Dark',   angle:-135 },
  { key:'retro-light',  label:'Retro · Light',  angle: -45 },
  { key:'modern-dark',  label:'Modern · Dark',  angle:  45 },
  { key:'modern-light', label:'Modern · Light', angle: 135 },
  { key:'walle',        label:'WALL-E',          angle: 160 },
  { key:'eve',          label:'EVE',             angle: 180 },
];
var dialModeIdx = 0, dialOpen = false;

function buildDialPositions() {
  var wrap = document.getElementById('dialPositions');
  if (!wrap) return;
  wrap.innerHTML = '';
  DISPLAY_MODES.forEach(function(m, i) {
    if (i > 0) { var div = document.createElement('div'); div.className='dial-divider'; wrap.appendChild(div); }
    var pos = document.createElement('div');
    pos.className = 'dial-pos';
    pos.onclick = (function(idx) { return function(e) { e.stopPropagation(); setDialMode(idx); }; })(i);
    var dot = document.createElement('div');
    dot.className = 'dial-pos-dot' + (i===dialModeIdx?' active':'');
    dot.id = 'dpos-'+i;
    var lbl = document.createElement('div');
    lbl.className = 'dial-pos-label' + (i===dialModeIdx?' active':'');
    lbl.id = 'dlbl-'+i;
    lbl.textContent = m.label.split(' · ')[1] || m.label;
    pos.appendChild(dot); pos.appendChild(lbl); wrap.appendChild(pos);
  });
}

function applyDisplayMode(idx, animate) {
  var mode = DISPLAY_MODES[idx];
  document.documentElement.setAttribute('data-theme', mode.key);
  localStorage.setItem('cw2-theme-'+ROOM, mode.key);
  var needle = document.getElementById('dialNeedle');
  var name   = document.getElementById('dialModeName');
  if (needle) {
    if (animate === false) {
      needle.style.transition = 'none';
      needle.style.transform  = 'translateX(-50%) rotate(' + mode.angle + 'deg)';
      setTimeout(function() { needle.style.transition = ''; }, 50);
    } else {
      needle.style.transform = 'translateX(-50%) rotate(' + mode.angle + 'deg)';
    }
  }
  if (name) name.textContent = mode.label;
  DISPLAY_MODES.forEach(function(_, i) {
    var dot = document.getElementById('dpos-'+i);
    var lbl = document.getElementById('dlbl-'+i);
    if (dot) dot.className = 'dial-pos-dot'+(i===idx?' active':'');
    if (lbl) lbl.className = 'dial-pos-label'+(i===idx?' active':'');
  });
}

function setDialMode(idx) {
  dialModeIdx = idx;
  applyDisplayMode(idx, true);
  prevLines = Array.from({ length: ROWS }, function() { return '\x00'.repeat(COLS); });
  if (messages.length) showMessage(currentIdx);
}
function dialNext() { setDialMode((dialModeIdx+1) % DISPLAY_MODES.length); }
function toggleDial() {
  dialOpen = !dialOpen;
  document.getElementById('dial-panel').classList.toggle('open', dialOpen);
}
document.addEventListener('click', function(e) {
  if (dialOpen && !e.target.closest('#dial-panel') && !e.target.closest('#dial-trigger') && !e.target.closest('#dial-hint')) {
    dialOpen = false;
    document.getElementById('dial-panel').classList.remove('open');
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key==='ArrowRight'||e.key==='Enter'||e.key===' ') { e.preventDefault(); nextMsg(); }
  if (e.key==='ArrowLeft')  { e.preventDefault(); prevMsg(); }
  if (e.key==='f'||e.key==='F') document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  if (e.key==='Escape')         document.exitFullscreen && document.exitFullscreen();
  if (e.key==='m'||e.key==='M') dialNext();
});
window.addEventListener('click', function() {
  if (typeof enableSound === 'function') {
    var sp = document.getElementById('sound-prompt');
    if (sp) enableSound(sp);
  }
}, { once: true });

(async function() {
  buildBoard();
  buildDialPositions();
  updateClock();
  setInterval(updateClock, 10000);
  setInterval(updatePeriodTimer, 1000);
  updatePeriodTimer();
  updateSoundBtn();
  setTimeout(function() {
    var sp = document.getElementById('sound-prompt');
    if (sp) { sp.style.opacity = '0'; setTimeout(function(){sp.remove();}, 600); }
  }, 8000);
  await startBoard();
  setTimeout(function() { loadHonorRoll(); }, 2000);
  setInterval(function() { loadHonorRoll(); }, 30*60*1000);
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Cowboy Wire · SCRAP-E · Room 27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Special+Elite&family=Share+Tech+Mono&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── STEAMPUNK PALETTE ── */
:root {
  --cw-bg:          #0a0a08;
  --cw-amber:       #c8a840;
  --cw-amber-warm:  #d49530;   /* more orange-amber for names/titles */
  --cw-amber-bright:#e8c050;   /* lighter amber for secondary accents */
  --cw-highlight:   #f0d060;
  --cw-dim:         #8a7a40;
  --cw-copper:      #b87040;
  --cw-rust:        #7a3a10;
  --cw-green:       #00ff44;
  --cw-green-dim:   #00cc33;
  --cw-green-glow:  rgba(0,255,68,0.55);
  --cw-panel:       rgba(4,4,2,0.88);
  --font-crt:       'VT323', monospace;
  --font-type:      'Special Elite', serif;
  --font-mono:      'Share Tech Mono', monospace;
}

/* ── ROOT ── */
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
}

/* ── STAGE: fixed 1920×1080, scales to fit window ── */
#stage {
  position: absolute;
  width: 1920px;
  height: 1080px;
  transform-origin: top left;
  overflow: hidden;
}

/* ── LAYER 1: BACKGROUND IMAGE ── */
#layer-bg {
  position: absolute; inset: 0; z-index: 0;
  background: url('chassis-bg.png') 0 0 / 1920px 1080px no-repeat;
}

/* ── LAYER 2: CONTENT PANELS ── */
#layer-panels {
  position: absolute; inset: 0; z-index: 1;
}

/* ── LAYER 3: FOREGROUND OVERLAY ── */
#layer-fg {
  position: absolute; inset: 0; z-index: 10;
  background: url('chassis-overlay.png') 0 0 / 1920px 1080px no-repeat;
  pointer-events: none;
}

/* ── PANEL BASE ── */
.panel {
  position: absolute;
  overflow: hidden;
}

/* ══════════════════════════════════════════════════════
   PANEL STYLES — one block per panel, no cascade
   ══════════════════════════════════════════════════════ */

/* HEADER */
#p-header {
  left: 178px; top: 20px; width: 349px; height: 86px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 700;
  letter-spacing: 0.18em; color: #100c04;
  text-align: center; text-transform: uppercase;
  line-height: 1.3;
}

/* CLOCK */
#p-clock {
  left: 1662px; top: 32px; width: 158px; height: 68px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-crt); font-size: 30px;
  letter-spacing: 0.06em; color: var(--cw-highlight);
  text-shadow: 0 0 14px var(--cw-amber), 0 0 28px rgba(200,168,64,0.3);
}

/* EVENTS LIST — PSD coords 199,124,290,365 × 1.25 = 249,155,363,456 */
#p-events {
  left: 249px; top: 155px; width: 363px; height: 456px;
  padding: 8px 14px 8px 12px;
  display: flex; flex-direction: column;
}
#events-title {
  font-family: var(--font-mono); font-size: 19px;
  letter-spacing: 0.16em; color: var(--cw-amber);
  text-transform: uppercase; text-align: center;
  padding-bottom: 7px;
  border-bottom: 1px solid rgba(200,168,64,0.28);
  margin-bottom: 4px; flex-shrink: 0;
  text-shadow: 0 0 8px rgba(200,168,64,0.3);
}
#events-list { display: flex; flex-direction: column; flex: 1; justify-content: flex-start; gap: 0px; overflow: hidden; }
.ev-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 4px 0;
  border-bottom: 1px solid rgba(200,168,64,0.12);
}
.ev-item:last-child { border-bottom: none; }
.ev-left { display: flex; flex-direction: column; align-items: center; min-width: 52px; }
.ev-days-num {
  font-family: var(--font-crt); font-size: 30px; line-height: 1;
  color: var(--cw-highlight);
  text-shadow: 0 0 10px rgba(240,208,96,0.5);
}
.ev-days-lbl {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.1em; color: var(--cw-dim);
  text-transform: uppercase; line-height: 1;
}
.ev-right { flex: 1; min-width: 0; }
.ev-title {
  font-family: var(--font-mono); font-size: 15px;
  letter-spacing: 0.03em; color: var(--cw-amber-warm);
  text-transform: uppercase; line-height: 1.25;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.ev-date {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--cw-dim); margin-top: 1px;
  letter-spacing: 0.04em;
}
.ev-empty {
  font-family: var(--font-mono); font-size: 14px;
  color: rgba(200,168,64,0.3); letter-spacing: 0.12em;
  text-transform: uppercase; padding: 20px 0;
}

/* SCRAP-E SIGNAL INTERCEPT */
#p-crt {
  left: 700px; top: 172px; width: 566px; height: 388px;
  padding: 0;
  overflow: hidden;
  display: flex; flex-direction: column;
}
/* CRT scanlines — visible but not harsh */
#p-crt::before {
  content: '';
  position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 4px,
    rgba(0,0,0,0.14) 4px, rgba(0,0,0,0.14) 5px
  );
}
/* CRT phosphor glow + subtle vignette */
#p-crt::after {
  content: '';
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 50% 45%, rgba(200,168,64,0.07), transparent 68%),
    radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.35) 100%);
}
#crt-header {
  display: flex; align-items: center; gap: 8px;
  position: relative; z-index: 1;
}
#crt-led {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: var(--cw-green);
  box-shadow: 0 0 6px var(--cw-green), 0 0 12px var(--cw-green-glow);
  animation: ledPulse 2.4s ease-in-out infinite;
}
@keyframes ledPulse { 0%,100%{opacity:1;box-shadow:0 0 6px var(--cw-green),0 0 12px var(--cw-green-glow)} 50%{opacity:0.5;box-shadow:0 0 3px var(--cw-green)} }
#crt-label-text {
  font-family: var(--font-mono); font-size: 12px;
  letter-spacing: 0.26em; color: var(--cw-dim);
  text-transform: uppercase;
}
#crt-divider {
  height: 1px; background: linear-gradient(90deg, transparent, var(--cw-amber), transparent);
  opacity: 0.3; position: relative; z-index: 1;
}
#crt-headline {
  font-family: var(--font-type); font-size: 27px; line-height: 1.28;
  color: var(--cw-highlight); letter-spacing: 0.02em;
  min-height: 4em; position: relative; z-index: 1;
}
/* typewriter cursor */
#crt-cursor {
  display: inline-block; width: 2px; height: 1.1em;
  background: var(--cw-highlight); vertical-align: text-bottom;
  margin-left: 2px; animation: cursorBlink 0.8s step-end infinite;
  position: relative; z-index: 1;
}
@keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }
#crt-body {
  flex: 1; font-family: var(--font-mono); font-size: 15px; line-height: 1.5;
  color: var(--cw-amber); overflow: hidden; position: relative; z-index: 1;
  opacity: 0.9;
}
#crt-footer {
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 1;
}
#crt-source {
  font-family: var(--font-mono); font-size: 12px;
  letter-spacing: 0.12em; color: var(--cw-dim);
  text-transform: uppercase;
}
#crt-counter {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--cw-dim); letter-spacing: 0.1em;
}

/* ── CRT MULTI-PANE SYSTEM ── */
#crt-pane-news, #crt-pane-bell, #crt-pane-standby, #crt-pane-data {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
#crt-pane-news { padding: 14px 28px 10px 32px; gap: 10px; }
#crt-pane-bell { padding: 12px 18px 8px 18px; gap: 0; }
#crt-pane-standby { padding: 0; }
#crt-pane-data { padding: 24px 28px; justify-content: center; }
/* Active pane */
#p-crt.crt-news #crt-pane-news,
#p-crt.crt-bell #crt-pane-bell,
#p-crt.crt-standby #crt-pane-standby,
#p-crt.crt-data #crt-pane-data {
  opacity: 1; pointer-events: auto;
}
/* ── BELL SCHEDULE PANE ── */
#crt-bell-hdr {
  font-family: var(--font-mono); font-size: 16px;
  letter-spacing: 0.22em; color: var(--cw-amber);
  text-align: center; text-transform: uppercase;
  padding-bottom: 7px; margin-bottom: 6px;
  border-bottom: 1px solid rgba(200,168,64,0.3);
  flex-shrink: 0;
  text-shadow: 0 0 10px rgba(200,168,64,0.3);
  position: relative; z-index: 1;
}
#crt-bell-rows {
  display: flex; flex-direction: column;
  flex: 1; justify-content: space-between;
  overflow: hidden; position: relative; z-index: 1;
}
.crt-br {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 6px; border-radius: 3px;
  font-family: var(--font-crt);
  border-bottom: 1px solid rgba(200,168,64,0.07);
}
.crt-br.is-now {
  background: rgba(200,168,64,0.09);
  border-bottom-color: rgba(200,168,64,0.15);
}
.crt-br.is-brk { opacity: 0.6; }
.crt-brl {
  flex: 1; font-size: 21px; letter-spacing: 0.06em;
  color: var(--cw-amber-warm);
  white-space: nowrap; overflow: hidden;
}
.crt-br.is-now .crt-brl { color: var(--cw-highlight); }
.crt-brt {
  font-size: 18px; color: var(--cw-dim); letter-spacing: 0.04em;
  white-space: nowrap;
}
.crt-br.is-now .crt-brt { color: var(--cw-amber); }
.crt-brsep {
  color: var(--cw-dim); opacity: 0.35;
  margin: 0 3px; font-size: 15px; font-family: var(--font-crt);
}
/* ── STANDBY PANE ── */
#crt-standby-img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
/* ── DATA ACCESS PANE ── */
#crt-data-lines {
  display: flex; flex-direction: column; gap: 10px;
  position: relative; z-index: 1;
}
.crt-dl {
  font-family: var(--font-mono); font-size: 15px;
  letter-spacing: 0.1em; color: var(--cw-amber);
  opacity: 0; transform: translateX(-6px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  text-transform: uppercase;
}
.crt-dl.vis { opacity: 1; transform: translateX(0); }
.crt-dl.ok { color: var(--cw-highlight); }
.crt-dl.dim { color: var(--cw-dim); }

/* STATUS — 3-zone strip */
#p-status {
  left: 673px; top: 627px; width: 616px; height: 90px;
  padding: 0;
  display: flex; align-items: stretch;
}
/* Thin vertical dividers between zones */
.st-div {
  width: 1px; flex-shrink: 0;
  background: linear-gradient(180deg, transparent, rgba(200,168,64,0.22), transparent);
  margin: 10px 0;
}
/* LEFT — period label + end time */
#st-left {
  flex: 0 0 188px; display: flex; flex-direction: column;
  justify-content: center; padding: 0 18px 0 20px;
}
#st-period {
  font-family: var(--font-crt); font-size: 24px;
  color: var(--cw-highlight); letter-spacing: 0.06em;
  text-shadow: 0 0 10px rgba(240,208,96,0.4);
  line-height: 1.1; white-space: nowrap;
}
#st-ends {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--cw-dim); letter-spacing: 0.1em;
  text-transform: uppercase; margin-top: 4px;
  white-space: nowrap;
}
/* MIDDLE — large countdown stacked */
#st-mid {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 4px 8px; gap: 2px;
}
#st-mins-num {
  font-family: var(--font-crt); font-size: 38px;
  color: var(--cw-highlight); line-height: 1;
  letter-spacing: 0.02em;
  text-shadow: 0 0 14px rgba(240,208,96,0.5);
}
#st-mins-lbl {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--cw-dim); letter-spacing: 0.12em;
  text-transform: uppercase; text-align: center;
  line-height: 1.5;
}
/* 1-minute warning flash */
@keyframes minWarn { 0%,100%{opacity:1} 50%{opacity:0.15} }
.flashing { animation: minWarn 1.4s ease-in-out infinite; }
/* Active pip gentle pulse */
@keyframes pipPulse { 0%,100%{opacity:0.78} 50%{opacity:0.48} }
/* RIGHT — pass policy */
#st-right {
  flex: 0 0 188px; display: flex; flex-direction: column;
  justify-content: center; padding: 0 20px 0 18px;
  align-items: flex-end;
}
#st-pass-lbl {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.2em; color: var(--cw-dim);
  text-transform: uppercase; margin-bottom: 5px;
}
#st-pass-val {
  display: flex; align-items: center; gap: 7px;
}
#st-pass-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  transition: background 0.6s, box-shadow 0.6s;
}
#st-pass-dot.open {
  background: var(--cw-green);
  box-shadow: 0 0 6px var(--cw-green), 0 0 12px var(--cw-green-glow);
  animation: ledPulse 2.4s ease-in-out infinite;
}
#st-pass-dot.warn {
  background: #c8a020;
  box-shadow: 0 0 6px rgba(200,160,32,0.9), 0 0 12px rgba(200,160,32,0.4);
  animation: ledPulse 1.2s ease-in-out infinite;
}
#st-pass-dot.restricted {
  background: #b83020;
  box-shadow: 0 0 6px rgba(184,48,32,0.9), 0 0 12px rgba(184,48,32,0.4);
  animation: none;
}
#st-pass-dot.grey {
  background: rgba(200,168,64,0.35);
  box-shadow: none; animation: none;
}
#st-pass-dot.off {
  background: rgba(200,168,64,0.15); box-shadow: none; animation: none;
}
#st-pass-txt {
  font-family: var(--font-crt); font-size: 21px;
  letter-spacing: 0.08em; color: var(--cw-amber-warm);
  white-space: nowrap;
}

/* SOUND LEVEL */
#p-sound {
  left: 1341px; top: 186px; width: 445px; height: 161px;
  padding: 12px 20px 10px 20px;
  display: flex; flex-direction: column; gap: 8px;
}
#sound-bars {
  flex: 1; display: flex; align-items: flex-end; gap: 4px;
}
.s-bar {
  flex: 1; border-radius: 2px 2px 0 0;
  background: rgba(200,168,64,0.15);
  min-height: 4px;
  transition: height 0.1s ease, background 0.12s ease;
}
.s-bar.lit  { background: var(--cw-amber); }
.s-bar.hot  { background: var(--cw-copper); box-shadow: 0 0 6px rgba(184,112,64,0.5); }
.s-bar.peak { background: #ff6040; box-shadow: 0 0 8px rgba(255,96,64,0.6); }
#sound-readout {
  display: flex; align-items: baseline; justify-content: flex-end; gap: 6px;
}
#sound-db-num {
  font-family: var(--font-crt); font-size: 28px; color: var(--cw-amber);
  line-height: 1;
}
#sound-db-unit {
  font-family: var(--font-mono); font-size: 12px;
  letter-spacing: 0.12em; color: var(--cw-dim);
}
#sound-status-txt {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.18em; color: var(--cw-dim);
  text-transform: uppercase; text-align: right;
}

/* BIRTHDAYS */
#p-birthdays {
  left: 1341px; top: 409px; width: 409px; height: 154px;
  padding: 8px 16px 6px;
  display: flex; flex-direction: column; justify-content: flex-start; gap: 3px;
}
.bd-row {
  display: flex; align-items: center; gap: 7px;
}
.bd-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--cw-copper);
  box-shadow: 0 0 5px rgba(184,112,64,0.7);
  flex-shrink: 0;
}
.bd-name {
  flex: 1; min-width: 0;
  font-family: var(--font-mono); font-size: 14px;
  letter-spacing: 0.03em; color: var(--cw-amber-warm);
  text-transform: uppercase;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bd-date {
  font-family: var(--font-crt); font-size: 18px;
  color: var(--cw-highlight); flex-shrink: 0;
  text-shadow: 0 0 6px rgba(240,208,96,0.4);
}
.bd-days {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--cw-dim); letter-spacing: 0.05em;
  flex-shrink: 0; min-width: 46px; text-align: right;
}
.bd-today-banner {
  margin-top: 5px; padding-top: 5px;
  border-top: 1px solid rgba(200,168,64,0.18);
  font-family: var(--font-crt); font-size: 24px;
  letter-spacing: 0.07em; color: var(--cw-highlight);
  text-align: center; line-height: 1.1;
  text-shadow: 0 0 14px rgba(240,208,96,0.55);
  animation: bdToday 2.2s ease-in-out infinite;
}
@keyframes bdToday { 0%,100%{opacity:1} 50%{opacity:0.55} }
.bd-empty {
  font-family: var(--font-mono); font-size: 13px;
  color: rgba(200,168,64,0.3); letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* WEATHER */
#p-weather {
  left: 1340px; top: 639px; width: 408px; height: 110px;
  padding: 8px 16px;
  display: flex; align-items: center; gap: 16px;
}
#wx-temp-big {
  font-family: var(--font-crt); font-size: 56px; line-height: 1;
  color: var(--cw-highlight);
  text-shadow: 0 0 14px rgba(240,208,96,0.4);
  flex-shrink: 0;
}
#wx-mid { flex: 1; }
#wx-cond-lbl {
  font-family: var(--font-mono); font-size: 16px;
  color: var(--cw-amber); text-transform: uppercase;
  letter-spacing: 0.04em;
}
#wx-feels-lbl {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--cw-dim); letter-spacing: 0.04em;
  margin-top: 2px;
}
#wx-aqi-lbl {
  font-family: var(--font-mono); font-size: 12px;
  letter-spacing: 0.06em; margin-top: 3px;
}
#wx-fc { display: flex; gap: 10px; }
.wx-day { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.wx-day-name { font-family: var(--font-mono); font-size: 10px; color: var(--cw-dim); letter-spacing: 0.1em; }
.wx-day-hi { font-family: var(--font-crt); font-size: 20px; color: var(--cw-amber); }
.wx-day-lo { font-family: var(--font-mono); font-size: 11px; color: var(--cw-dim); }

/* PHOTO SLIDESHOW */
/* PHOTO — PSD 330,648,131,132 × 1.25 = 413,810,164,165 */
#p-photo {
  left: 413px; top: 810px; width: 164px; height: 165px;
  background: var(--cw-panel);
  border-radius: 26px;
  overflow: hidden;
}
#p-photo img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  transition: opacity 1.2s ease;
  filter: grayscale(1) sepia(.80) hue-rotate(-16deg) saturate(1.1) brightness(.70) contrast(1.15);
}
/* warm tint + dark vignette */
#p-photo::after {
  content: '';
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background:
    radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.82) 100%),
    radial-gradient(ellipse at 75% 25%, rgba(230,155,30,.28), transparent 70%),
    linear-gradient(180deg, rgba(220,170,40,.15) 0%, rgba(200,130,20,.12) 55%, rgba(0,0,0,.22) 100%);
}
/* scanlines — barely-there, just texture */
#p-photo::before {
  content: '';
  position: absolute; inset: 0; z-index: 4; pointer-events: none; opacity: .13;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,.7) 0px, rgba(0,0,0,.7) 1px, transparent 1px, transparent 10px);
}

/* ══════════════════════════════════════════════════════
   SCREEN EFFECTS — old display vibes per panel
   ══════════════════════════════════════════════════════ */

/* STATUS + BIRTHDAYS + WEATHER + SPORT CARDS: subtle scanlines */
#p-status::after,
#p-birthdays::after,
#p-weather::after,
.sd-card::after {
  content: '';
  position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 5px,
    rgba(0,0,0,.07) 5px, rgba(0,0,0,.07) 6px
  );
}

/* STATUS: amber phosphor vignette — like a small readout screen */
#p-status::before {
  content: '';
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%, rgba(200,168,64,.05), transparent 72%),
              radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,.28) 100%);
}

  var map={}; (rows||[]).forEach(function(r){ map[r.room+'|'+r.date]=r; });

function getSchedule(){
  var now=new Date(), ds=dateStr(now), dow=now.getDay();
  if(dow===0||dow===6||NO_SCHOOL.includes(ds)) return null;
  var ovr=window._cwOverrides||{};
  var hit=ovr[ROOM+'|'+ds]||ovr['global|'+ds];
  if(hit){ if(hit.custom_periods) return {periods:hit.custom_periods}; if(hit.schedule_type&&SCHEDULES[hit.schedule_type]) return SCHEDULES[hit.schedule_type]; }
  var events=window._cwCalEvents||[];
  var titles=events.filter(function(e){return e.start&&e.start.substring(0,10)===ds;}).map(function(e){return(e.title||'').toLowerCase();});
  var has=function(kw){return titles.some(function(t){return t.includes(kw);});};
  if(has('foggy')||has('late arrival')) return SCHEDULES.foggy;
  if(has('minimum')) return SCHEDULES.minimum;
  if(has('code day')) return SCHEDULES.codeDay;
  if(has('activity')) return SCHEDULES.activity;
  if(has('early release')) return SCHEDULES.earlyRelease;
  if(has('block')) return dow===3?SCHEDULES.blockWed:SCHEDULES.blockThu;
  if(dow===1) return SCHEDULES.earlyRelease;
  if(dow===3) return SCHEDULES.blockWed;
  if(dow===4) return SCHEDULES.blockThu;
  return SCHEDULES.regular;
}

function daysBetween(a,b){ return Math.round((new Date(a+'T00:00:00')-new Date(b+'T00:00:00'))/(24*60*60*1000)); }
function monDay(ds){ var dt=new Date(ds+'T00:00:00'); var M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC']; return M[dt.getMonth()]+' '+dt.getDate(); }
function getUpcomingEvents(ds){
  var cutoff=new Date(ds+'T00:00:00'); cutoff.setDate(cutoff.getDate()+60); var cs=dateStr(cutoff);
  var inW=function(d){return d&&d>=ds&&d<=cs;};
  var curated=CW_EVENTS.filter(function(e){return inW(e.start_date);}).map(function(e){return{title:e.title,start_date:e.start_date};});
  var feed=(window._cwCalEvents||[]).filter(function(e){return inW(e.start_date);}).map(function(e){return{title:e.title,start_date:e.start_date};});
  var seen={}; var all=curated.concat(feed).filter(function(e){
    if(!e.title||!e.title.trim()) return false;
    var k=e.title.toUpperCase().trim()+'|'+e.start_date; if(seen[k]) return false; seen[k]=true; return true;
  });

}

/* STATUS STRIP — period · countdown · pass policy */
function renderStatus(){
  var sched=getSchedule(), nm=nowMins();

  function xl(l){ return /^P(\d+)$/.test(l)?'PERIOD '+l.slice(1):l.toUpperCase(); }
  function f12(t){ var p=t.split(':'),h=parseInt(p[0]),m=p[1]; return(h%12||12)+':'+m+(h>=12?' PM':' AM'); }

  function setFlash(on){
    ['st-mins-num','st-mins-lbl'].forEach(function(id){
      var e=document.getElementById(id);
      if(e){ if(on) e.classList.add('flashing'); else e.classList.remove('flashing'); }
    });
  }

  function set(periodTxt,endsTxt,minsNum,minsLblHtml,dotCls,passTxt,passTxtColor,flash){
    document.getElementById('st-period').textContent   = periodTxt;
    document.getElementById('st-ends').textContent     = endsTxt;
    document.getElementById('st-mins-num').textContent = minsNum;
    document.getElementById('st-mins-lbl').innerHTML   = minsLblHtml;
    document.getElementById('st-pass-dot').className   = dotCls;
    var pt=document.getElementById('st-pass-txt');
    pt.textContent=passTxt; pt.style.color=passTxtColor;
    setFlash(!!flash);
  }

  if(!sched){
    set('NO SCHOOL','','','','off','CLOSED','var(--cw-dim)',false); return;
  }

  var inP=null, nextP=null;
  for(var i=0;i<sched.periods.length;i++){
    var p=sched.periods[i], s=toMins(p.start), e=toMins(p.end);
    if(nm>=s&&nm<e){ inP=p; break; }
    if(nm<s&&!nextP) nextP=p;
  }

  if(inP){
    var mLeft=toMins(inP.end)-nm;
    var flash=(mLeft<=1);
    var lbl='MIN LEFT UNTIL<br>END OF '+xl(inP.label);

    if(inP.brk){
      /* brunch or lunch — neutral grey, open */
      set(xl(inP.label),'ENDS '+f12(inP.end),String(mLeft),lbl,'grey','OPEN','var(--cw-dim)',flash);
    } else {
      /* class period — 4-state pass policy */
      var firstFifteen=(nm<toMins(inP.start)+15);
      var lastFifteen=(mLeft<=15);
      var lastWarn=(mLeft>15&&mLeft<=20); /* yellow last-chance window */
      var dotC,passT,passColor;
      if(firstFifteen||lastFifteen){
        dotC='restricted'; passT='RESTRICTED'; passColor='#c03828';
      } else if(lastWarn){
        dotC='warn'; passT='LAST CHANCE'; passColor='#c8a020';
      } else {
        dotC='open'; passT='ALLOWED'; passColor='var(--cw-green)';
      }
      set(xl(inP.label),'ENDS '+f12(inP.end),String(mLeft),lbl,dotC,passT,passColor,flash);
    }

  } else if(nextP){
    var mTo=toMins(nextP.start)-nm;
    if(nm<toMins(sched.periods[0].start)){
      set('PRE-BELL','FIRST BELL · '+f12(sched.periods[0].start),String(mTo),
        'MIN UNTIL<br>FIRST BELL','grey','OPEN','var(--cw-dim)',false);
    } else {
      set('PASSING',xl(nextP.label)+' STARTS '+f12(nextP.start),String(mTo),
        'MIN UNTIL<br>'+xl(nextP.label)+' STARTS','grey','OPEN','var(--cw-dim)',false);
    }

  } else {
    set('DISMISSED','SEE YOU TOMORROW','','','off','CLOSED','var(--cw-dim)',false);
  }

  // Update SCRAP-E body lights to reflect current pass state + birthdays
  updateBodyLights();
}

/* SCRAP-E BODY LIGHTS

   Small light → muted amber pulse normally; slow rainbow on student birthdays */
function updateBodyLights(){
  var big   = document.getElementById('bulb-big');
  var small = document.getElementById('bulb-small');

  /* ── BIG LIGHT: read pass dot class set by renderStatus() above ── */
  if(big){
    var cls = (document.getElementById('st-pass-dot')||{}).className || 'off';
    // Clear inline opacity so the animation drives it
    big.style.opacity = '';
    if(cls === 'open'){
      // GREEN — allowed
      big.style.background = 'radial-gradient(circle at 38% 38%, #80e880, #28a030 55%, #0a340a)';
      big.style.boxShadow  = '0 0 8px rgba(40,160,48,0.55), 0 0 16px rgba(40,160,48,0.18)';
      big.style.animation  = 'bodyMuted 4s ease-in-out infinite';
    } else if(cls === 'warn'){
      // YELLOW — last chance
      big.style.background = 'radial-gradient(circle at 38% 38%, #ffe060, #b08010 55%, #3e2c00)';
      big.style.boxShadow  = '0 0 8px rgba(176,128,16,0.55), 0 0 16px rgba(176,128,16,0.18)';
      big.style.animation  = 'bodyMuted 3s ease-in-out infinite';
    } else if(cls === 'restricted'){
      // RED — restricted
      big.style.background = 'radial-gradient(circle at 38% 38%, #ff7060, #b02818 55%, #380c08)';
      big.style.boxShadow  = '0 0 8px rgba(176,40,24,0.55), 0 0 16px rgba(176,40,24,0.18)';
      big.style.animation  = 'bodyMuted 4s ease-in-out infinite';
    } else if(cls === 'grey'){
      // NEUTRAL — passing / break / pre-bell
      big.style.background = 'radial-gradient(circle at 38% 38%, #ffe090, #c87020 55%, #4a2c08)';
      big.style.boxShadow  = '0 0 6px rgba(200,112,32,0.40), 0 0 12px rgba(200,112,32,0.14)';
      big.style.animation  = 'bodyMuted 5s ease-in-out infinite';
    } else {
      // OFF — dismissed / no school
      big.style.background = 'radial-gradient(circle at 38% 38%, #38200c, #1c0e06 55%, #090504)';
      big.style.boxShadow  = 'none';
      big.style.animation  = 'none';
      big.style.opacity    = '0.25';
    }
  }

  /* ── SMALL LIGHT: birthday indicator ── */
  if(small){

    var hasBday=(CW_BIRTHDAYS||[]).some(function(b){ return b.month==cm && b.day==cd; });
    if(hasBday){

      small.style.background  = 'var(--cw-amber)';
      small.style.boxShadow   = '0 0 7px rgba(200,168,64,0.6), 0 0 14px rgba(200,168,64,0.28)';
      small.style.animation   = 'bdayRainbow 6s linear infinite, bodyMuted 5s ease-in-out infinite';
    } else {

      small.style.background  = 'var(--cw-amber)';
      small.style.boxShadow   = '0 0 5px rgba(200,168,64,0.45), 0 0 10px rgba(200,168,64,0.18)';
      small.style.animation   = 'bodyMuted 5.5s ease-in-out infinite';
      small.style.filter      = '';
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   CRT CONTROLLER — modes: news | bell | standby | data
   During class: bell schedule (future: rotate w/ objectives)
   Passing/brunch/lunch: bell schedule
   Off hours / no school: standby 10s → data 3s → news loop
   ═══════════════════════════════════════════════════════════ */
(function(){
  var crtEl = document.getElementById('p-crt');
  var CRT_MODE = 'news';

  function setCRTMode(mode){
    if(CRT_MODE === mode) return;
    CRT_MODE = mode;
    ['crt-news','crt-bell','crt-standby','crt-data'].forEach(function(c){ crtEl.classList.remove(c); });
    crtEl.classList.add('crt-' + mode);
  }

  /* ── NEWS ── */
  var _crtItems=[], _crtCur=0, _crtCharIdx=0, _crtTypeT=null, _crtNextT=null;
  function _showNewsItem(idx){
    if(!_crtItems.length) return;
    var it=_crtItems[idx%_crtItems.length];
    document.getElementById('crt-counter').textContent=(idx%_crtItems.length+1)+' / '+_crtItems.length;
    document.getElementById('crt-source').textContent='SOURCE: '+it.source.toUpperCase();
    document.getElementById('crt-body').textContent=it.body||'';
    var hlEl=document.getElementById('crt-hl-text');
    hlEl.textContent='';
    clearTimeout(_crtTypeT); clearTimeout(_crtNextT);
    _crtCharIdx=0;
    var full=it.headline;
    function type(){
      if(_crtCharIdx<full.length){
        hlEl.textContent=full.slice(0,++_crtCharIdx);
        _crtTypeT=setTimeout(type, 28+Math.random()*22);
      } else {
        _crtNextT=setTimeout(function(){
          _crtCur=(_crtCur+1)%_crtItems.length;
          _showNewsItem(_crtCur);
        }, 16000);
      }
    }
    type();
  }
  function _startNews(){
    if(!CW_NEWS.length){
      document.getElementById('crt-hl-text').textContent='NO SIGNAL — SCANNING...';
      document.getElementById('crt-body').textContent='SCRAP-E is searching for transmissions.';
    } else {
      _crtItems=CW_NEWS; _crtCur=0; _showNewsItem(0);
    }
    setCRTMode('news');
  }
  function _stopNews(){ clearTimeout(_crtTypeT); clearTimeout(_crtNextT); }

  /* ── BELL SCHEDULE ── */
  function _fmt12(t){ var p=t.split(':'),h=parseInt(p[0]),m=p[1]; return (h%12||12)+':'+m+' '+(h>=12?'PM':'AM'); }
  function _renderBell(){
    var sched=(typeof getSchedule==='function')?getSchedule():null;
    if(!sched){ _startNews(); return; }
    var nm=(typeof nowMins==='function')?nowMins():0;
    var tm=(typeof toMins==='function')?toMins:function(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);};
    var labels={regular:'REGULAR BELL',earlyRelease:'EARLY RELEASE',blockWed:'BLOCK DAY',blockThu:'BLOCK DAY',minimum:'MINIMUM DAY',foggy:'FOGGY SCHEDULE',activity:'ACTIVITY DAY',codeDay:'CODE DAY'};
    var hdr=document.getElementById('crt-bell-hdr');
    if(hdr) hdr.textContent='★ '+(labels[window._cwSchedName]||'BELL SCHEDULE')+' ★';
    var rows=document.getElementById('crt-bell-rows');
    if(!rows) return;
    var html='';
    sched.periods.forEach(function(p){
      var s=tm(p.start),e=tm(p.end),now=(nm>=s&&nm<e);
      html+='<div class="crt-br'+(p.brk?' is-brk':'')+(now?' is-now':'')+'">'
        +'<span class="crt-brl">'+(now?'▶ ':'')+p.label+'</span>'
        +'<span class="crt-brt">'+_fmt12(p.start)+'</span>'
        +'<span class="crt-brsep">›</span>'
        +'<span class="crt-brt">'+_fmt12(p.end)+'</span>'
        +'</div>';
    });
    rows.innerHTML=html;
    setCRTMode('bell');
  }

  /* ── DATA ACCESS ANIMATION ── */
  var _offTimers=[];
  function _clearOff(){ _offTimers.forEach(clearTimeout); _offTimers=[]; }
  var DATA_LINES=[
    {t:'INITIALIZING SCRAP-E SYSTEMS...'},
    {t:'CHECKING CALENDAR FEEDS...       [OK]', cls:'ok'},
    {t:'LOADING WEATHER DATA...          [OK]', cls:'ok'},
    {t:'FETCHING NEWS BROADCAST...       [OK]', cls:'ok'},
    {t:'SCANNING HONOR ROLL DB...        [OK]', cls:'ok'},
    {t:'SIGNAL INTERCEPT: ACTIVE.', cls:'ok'},
  ];
  function _showDataAccess(onDone){
    setCRTMode('data');
    var box=document.getElementById('crt-data-lines');
    box.innerHTML=DATA_LINES.map(function(l){ return '<div class="crt-dl'+(l.cls?' '+l.cls:'')+'">'+l.t+'</div>'; }).join('');
    var els=box.querySelectorAll('.crt-dl');
    els.forEach(function(el,i){
      _offTimers.push(setTimeout(function(){ el.classList.add('vis'); },i*320));
    });
    _offTimers.push(setTimeout(function(){ if(onDone) onDone(); }, els.length*320+800));
  }
  function _startOffSequence(){
    _clearOff(); _stopNews();
    setCRTMode('standby');
    _offTimers.push(setTimeout(function(){
      _showDataAccess(function(){ _startNews(); });
    }, 10000));
  }

  /* ── MAIN TICK ── */
  var _last=null;
  function _tick(){
    var sched=(typeof getSchedule==='function')?getSchedule():null;
    var nm=(typeof nowMins==='function')?nowMins():0;
    var tm=(typeof toMins==='function')?toMins:function(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);};
    if(!sched){
      if(_last!=='off'){ _startOffSequence(); _last='off'; } return;
    }
    var firstStart=tm(sched.periods[0].start);
    var lastEnd=tm(sched.periods[sched.periods.length-1].end);

    // Find which period we're currently in (if any)
    var curPeriod=null;
    sched.periods.forEach(function(p){ if(nm>=tm(p.start)&&nm<tm(p.end)) curPeriod=p; });
    var inPeriod=(curPeriod!==null);
    var isBreak=(inPeriod && !!curPeriod.brk);  // brunch or lunch

    // During a break, find when the next class period starts
    var nextClassStart=null;
    if(isBreak){
      for(var i=0;i<sched.periods.length;i++){
        var ps=tm(sched.periods[i].start);
        if(!sched.periods[i].brk && ps>nm){ nextClassStart=ps; break; }
      }
    }

    var afterSchool=(nm>=lastEnd);
    var longBefore=(nm<firstStart-60);

    if(inPeriod && !isBreak){
      // Class in session → bell schedule (future: rotate with objectives)
      _clearOff(); _stopNews();
      if(_last!=='bell'){ _renderBell(); _last='bell'; }

    } else if(isBreak){
      // Brunch or lunch — show news; switch to bell 2 min before next class
      var nearEnd=(nextClassStart!==null && (nextClassStart-nm)<=2);
      if(nearEnd){
        _clearOff(); _stopNews();
        if(_last!=='bell'){ _renderBell(); _last='bell'; }
      } else {
        _clearOff();
        if(_last!=='news'){ _startNews(); _last='news'; }
      }

    } else if(afterSchool||longBefore){
      // Off hours → standby → data → news loop
      if(_last!=='off'){ _startOffSequence(); _last='off'; }

    } else {
      // Passing period or <60 min before school → bell schedule
      _clearOff(); _stopNews();
      if(_last!=='bell'){ _renderBell(); _last='bell'; }
    }
  }

  /* Re-highlight current period every minute while in bell mode */
  setInterval(function(){ if(CRT_MODE==='bell') _renderBell(); }, 60000);

  /* startCRT() is called by loadAll() after news data is ready */
  window.startCRT = function(){
    _tick();
    setInterval(_tick, 30000);
    setInterval(function(){ if(CW_NEWS.length>0 && !_crtItems.length) _crtItems=CW_NEWS; }, 15000);
  };
})();

/* ─── CRT TOP BULB CLOCK ─────────────────────────────────────
   :00   → 40-second burst: all 5 randomly fade in/out (fast)
   :40s  → Pip 1 slow-fades on, others dim  (holds to 12:00)
   12:00 → Pip 1 fades off, Pip 2 fades on  (holds to 24:00)
   24:00 → Pip 2 fades off, Pip 3 fades on  (holds to 36:00)
   36:00 → Pip 3 fades off, Pip 4 fades on  (holds to 48:00)
   48:00 → Pip 4 fades off, Pip 5 fades on  (holds to :00)
   ───────────────────────────────────────────────────────── */
(function crtBulbClock(){
  var ids=['bcrt-1','bcrt-2','bcrt-3','bcrt-4','bcrt-5'];
  var pips=ids.map(function(id){ return document.getElementById(id); });
  var DIM=0.1, burstTimer=null;

  function setOp(p, v){
    if(p) p.style.opacity=String(v);
  }

  function startBurst(){
    pips.forEach(function(p){ if(p){ p.classList.add('burst'); setOp(p, DIM); } });
    /* small delay so transition class is applied first */
    setTimeout(function(){
      burstTimer=setInterval(function(){
        pips.forEach(function(p){
          if(p) setOp(p, Math.random()>0.45 ? (0.45+Math.random()*0.55).toFixed(2) : DIM);
        });
      }, 600);
    }, 60);
  }

  function stopBurst(){
    if(burstTimer){ clearInterval(burstTimer); burstTimer=null; }
    pips.forEach(function(p){ if(p) p.classList.remove('burst'); });
  }

  function showPip(idx){
    /* crossfade: active gets gentle pulse, others go dim */
    pips.forEach(function(p,i){
      if(!p) return;
      if(i===idx){
        p.style.opacity='';  /* let animation control */
        p.style.animation='pipPulse 2.8s ease-in-out infinite';
      } else {
        p.style.animation='none';
        setOp(p, DIM);
      }
    });
  }

  var lastPhase=-1;
  function tick(){
    var now=new Date(), totSec=now.getMinutes()*60+now.getSeconds();
    var phase= totSec<40   ? 0   /* burst */
             : totSec<720  ? 1   /* pip 1:  0:40–12:00 */
             : totSec<1440 ? 2   /* pip 2: 12:00–24:00 */
             : totSec<2160 ? 3   /* pip 3: 24:00–36:00 */
             : totSec<2880 ? 4   /* pip 4: 36:00–48:00 */
             : 5;                /* pip 5: 48:00–59:59 */
    if(phase===lastPhase) return;
    lastPhase=phase;
    if(phase===0){ startBurst(); }
    else { stopBurst(); showPip(phase-1); }
  }

  tick();
  setInterval(tick, 1000);
})();

/* PHOTO SLIDESHOW — Google Drive via Apps Script */
var DRIVE_PHOTO_URL = 'https://script.google.com/macros/s/AKfycbwFbF2ssCZFxwYYf2ziZBA7gQ9ZEpITFGL5W5clMuYaquxWiAxlh1Kqicc60Ztn68ts/exec';
var PHOTOS = [], photoIdx = 0, photoActive = 0;
var photoA, photoB;

function initPhotos(){
  photoA = document.getElementById('photo-img');
  /* create a second img for crossfade */
  photoB = document.createElement('img');
  photoB.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.2s ease;';
  document.getElementById('p-photo').appendChild(photoB);
}

function setPhoto(src){
  var next = photoActive ? photoA : photoB;
  var prev = photoActive ? photoB : photoA;
  if(!src) return;
  next.onload = function(){
    next.style.opacity = '1';
    prev.style.opacity = '0';
    photoActive = photoActive ? 0 : 1;
  };
  next.src = src;
}

function nextPhoto(){
  if(!PHOTOS.length) return;
  photoIdx = (photoIdx + 1) % PHOTOS.length;
  setPhoto(PHOTOS[photoIdx]);
}

async function loadPhotos(){
  try{
    var res = await fetch(DRIVE_PHOTO_URL);
    if(!res.ok) throw new Error('http '+res.status);
    var data = await res.json();
    var urls = (data && Array.isArray(data.photos)) ? data.photos.filter(Boolean) : [];
    if(urls.length){
      PHOTOS = urls;
      photoIdx = 0;
      setPhoto(PHOTOS[0]);
      document.getElementById('p-photo').style.background = 'none';
    }
  } catch(e){
    console.warn('[CW2 Photos] Drive fetch failed:', e.message);
    /* retry in 30s */
    setTimeout(loadPhotos, 30000);
  }
}

setInterval(nextPhoto, 10000);

/* ═══════════════════════════════════════════════════════════
   LOAD ALL & BOOT
   ═══════════════════════════════════════════════════════════ */
async function loadAll(){
  await loadRoomConfig();
  await loadNoMedia();
  await loadOverrides();
  await loadCwEvents();
  await loadCwCalendar();
  await loadBirthdays();
  await loadSportDays();
  await loadInspiration();
  await loadWeather();
  await loadAirQuality();
  await loadNews();
  renderEvents();
  renderBirthdays();
  renderSportDays();
  renderWeather();
  renderWisdom();
  await renderHonorRoll();
  startCRT();
}

(async function boot(){
  /* immediate renders */
  renderClock(); setInterval(renderClock, 10000);
  setInterval(renderStatus, 5000);
  renderStatus();

  /* start eyes */
  startEyes();

  /* init photo bay */
  initPhotos();
  loadPhotos();

  /* load data */
  await loadAll();

  /* refresh every 5 min */
  setInterval(loadAll, 5*60*1000);
})();
</script>
